<div class="login-page">
  <mat-card class="login-card">
    <div class="login-inner">

      <div class="login-header">
        <div class="login-logo">F</div>
        <h1>Financeiro Encontro</h1>
        <p>Acesse sua conta para continuar</p>
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <mat-form-field appearance="outline" class="w-full">
          <mat-label>E-mail</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          @if (email?.invalid && email?.touched) {
            <mat-error>Informe um e-mail válido</mat-error>
          }
        </mat-form-field>

        <mat-form-field appearance="outline" class="w-full">
          <mat-label>Senha</mat-label>
          <input matInput
            [type]="showPassword ? 'text' : 'password'"
            formControlName="senha"
            autocomplete="current-password" />
          <button mat-icon-button matSuffix type="button"
            (click)="showPassword = !showPassword"
            [attr.aria-label]="showPassword ? 'Ocultar senha' : 'Mostrar senha'">
            <mat-icon>{{ showPassword ? 'visibility' : 'visibility_off' }}</mat-icon>
          </button>
          @if (senha?.invalid && senha?.touched) {
            <mat-error>Senha é obrigatória</mat-error>
          }
        </mat-form-field>

        @if (errorMessage) {
          <div class="validation__banner validation__banner--error">
            {{ errorMessage }}
          </div>
        }

        <button
          mat-flat-button
          type="submit"
          class="btn--full btn--lg"
          [disabled]="loading || form.invalid">
          @if (loading) {
            <mat-progress-spinner class="btn__spinner" diameter="20" mode="indeterminate" />
          } @else {
            Entrar
          }
        </button>
      </form>

    </div>
  </mat-card>
</div>
