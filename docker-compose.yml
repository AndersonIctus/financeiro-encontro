version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: financeiro_encontro_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: financeiro_encontro_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      UPLOAD_FOLDER: ${UPLOAD_FOLDER:-/app/uploads}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: ${JWT_ALGORITHM}
      JWT_EXPIRE_MINUTES: ${JWT_EXPIRE_MINUTES}
      APP_PORT: ${APP_PORT:-8000}
    volumes:
      - uploads_data:${UPLOAD_FOLDER:-/app/uploads}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:${APP_PORT:-8000}"

  frontend:
    build: ./frontend
    container_name: financeiro_encontro_frontend
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: financeiro_encontro_nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
  uploads_data:
