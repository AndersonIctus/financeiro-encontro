services:
  - type: web
    name: financeiro-encontro-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRE_MINUTES
        value: 480
      - key: UPLOAD_FOLDER
        value: /tmp/uploads
      - key: SQL_ECHO
        value: false
      - key: CORS_ORIGINS
        fromService:
          type: static
          name: financeiro-encontro-frontend
          property: url

  - type: static
    name: financeiro-encontro-frontend
    rootDir: frontend/financeiro-encontro
    buildCommand: sed -i "s|##API_URL##|$API_URL|g" src/environments/environment.prod.ts && npm run build
    staticPublishPath: dist/financeiro-encontro/browser
    plan: free
    envVars:
      - key: API_URL
        fromService:
          type: web
          name: financeiro-encontro-backend
          property: url
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
